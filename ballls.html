<!doctype html>
<html lang="pl">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Gra w Kulki</title>
	<style>
		:root {
			--bg-a: #f7f4e8;
			--bg-b: #d9efe0;
			--bg-dot-a: #ffffffab;
			--bg-dot-b: #ffffffe0;
			--panel: #ffffffc7;
			--ink: #203229;
			--muted: #5a6c63;
			--accent: #1f8a6f;
			--danger: #b54646;
			--grid-light: #f8fff8;
			--grid-dark: #e6f3e8;
			--cell-stroke: #b9ccb9;
			--board-shadow: 0 18px 42px #1a3f302e;
			--board-bg: #ffffffa6;
			--board-border: #cae3d2;
			--menu-border: #d5e4d8;
			--menu-btn-bg: #f4fbf6;
			--menu-btn-hover: #e8f6eb;
		}

		body.theme-dark {
			--bg-a: #111a22;
			--bg-b: #1a2b22;
			--bg-dot-a: #9ee4ff1a;
			--bg-dot-b: #d0ffde14;
			--panel: #101c25d6;
			--ink: #e8f4f0;
			--muted: #b2c6bd;
			--accent: #51d5b2;
			--danger: #ff8181;
			--grid-light: #1a2b33;
			--grid-dark: #15232b;
			--cell-stroke: #33505f;
			--board-shadow: 0 20px 48px #00000052;
			--board-bg: #0f1f29db;
			--board-border: #355060;
			--menu-border: #35505f;
			--menu-btn-bg: #1a2e3a;
			--menu-btn-hover: #223947;
		}

		* {
			box-sizing: border-box;
		}

		html,
		body {
			height: 100%;
			margin: 0;
			font-family: "Trebuchet MS", "Segoe UI", sans-serif;
			color: var(--ink);
			background:
				radial-gradient(circle at 20% 15%, var(--bg-dot-a) 0 14%, transparent 14.5%),
				radial-gradient(circle at 82% 80%, var(--bg-dot-b) 0 12%, transparent 12.5%),
				linear-gradient(135deg, var(--bg-a), var(--bg-b));
			touch-action: manipulation;
		}

		.app {
			min-height: 100%;
			display: grid;
			grid-template-rows: auto 1fr auto;
			gap: 12px;
			padding: 14px;
		}

		.menu {
			width: min(760px, 100%);
			margin: 0 auto;
			background: var(--panel);
			border: 1px solid var(--menu-border);
			border-radius: 16px;
			display: flex;
			flex-wrap: wrap;
			align-items: center;
			justify-content: center;
			gap: 10px 16px;
			padding: 10px 14px;
			box-shadow: 0 8px 20px #16312a1a;
			backdrop-filter: blur(5px);
		}

		.menu button,
		.menu select {
			border-radius: 10px;
			border: 1px solid #9fc8b0;
			background: var(--menu-btn-bg);
			color: var(--ink);
			font-size: 14px;
			font-weight: 600;
			padding: 8px 12px;
			cursor: pointer;
			touch-action: manipulation;
		}

		.menu button:hover,
		.menu select:hover {
			background: var(--menu-btn-hover);
		}

		.menu .label {
			font-weight: 700;
			color: var(--muted);
			letter-spacing: 0.02em;
		}

		.score {
			font-size: 15px;
			font-weight: 700;
			color: var(--accent);
			min-width: 110px;
			text-align: center;
		}

		.board-wrap {
			width: min(760px, 96vw, calc(100dvh - 225px));
			margin: 0 auto;
			position: relative;
			animation: riseIn 420ms ease-out both;
		}

		#board {
			width: 100%;
			height: auto;
			display: block;
			border-radius: 22px;
			background: var(--board-bg);
			border: 1px solid var(--board-border);
			box-shadow: var(--board-shadow);
			touch-action: manipulation;
		}

		.status {
			text-align: center;
			font-size: 14px;
			font-weight: 600;
			color: var(--muted);
			min-height: 20px;
		}

		.cell {
			stroke: var(--cell-stroke);
			stroke-width: 1;
			cursor: pointer;
			transition: fill 120ms ease;
			touch-action: none;
		}

		.cell.light {
			fill: var(--grid-light);
		}

		.cell.dark {
			fill: var(--grid-dark);
		}

		.cell.path {
			fill: #dff5ea;
		}

		.cell.invalid {
			animation: invalidFlash 280ms ease;
		}

		.ball {
			pointer-events: none;
			transform-box: fill-box;
			transform-origin: center;
		}

		.ball .ball-inner {
			transition: filter 150ms ease;
		}

		.ball.selected .ball-inner {
			animation: selectedBounce 620ms ease-in-out infinite;
			filter: drop-shadow(0 4px 8px #10302744);
		}

		.ball.moving .ball-inner {
			filter: drop-shadow(0 7px 9px #16382d56);
		}

		.ball.popping .ball-inner {
			animation: popOut 220ms ease forwards;
		}

		.footer {
			text-align: center;
			font-size: 12px;
			color: var(--muted);
			opacity: 0.9;
			padding-bottom: 6px;
		}

		@keyframes selectedBounce {
			0%,
			100% {
				transform: translateY(0px) scale(1);
			}
			40% {
				transform: translateY(-5px) scale(1.02);
			}
			65% {
				transform: translateY(-2px) scale(1);
			}
		}

		@keyframes popOut {
			0% {
				transform: scale(1);
				opacity: 1;
			}
			100% {
				transform: scale(0.1);
				opacity: 0;
			}
		}

		@keyframes invalidFlash {
			0% {
				fill: #ffdada;
			}
			100% {
				fill: inherit;
			}
		}

		@keyframes riseIn {
			from {
				opacity: 0;
				transform: translateY(8px);
			}
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		@media (max-width: 640px) {
			.app {
				padding: 8px;
				gap: 8px;
			}

			.menu {
				border-radius: 13px;
				gap: 8px 10px;
			}

			.menu button,
			.menu select {
				font-size: 13px;
				padding: 7px 10px;
			}

			.board-wrap {
				width: min(98vw, calc(100dvh - 195px));
			}

			.footer {
				font-size: 11px;
			}
		}

		@media (max-height: 720px) {
			.board-wrap {
				width: min(95vw, calc(100dvh - 170px));
			}
		}
	</style>
</head>
<body>
	<div class="app">
		<div class="menu">
			<button id="new-game" type="button">Nowa gra</button>
			<button id="theme-toggle" type="button" aria-pressed="false">Ciemny motyw</button>

			<span class="label">Ilość kolorów:</span>
			<select id="colors-count" aria-label="Ilość kolorów">
				<option value="4">4</option>
				<option value="5">5</option>
				<option value="6" selected>6</option>
				<option value="7">7</option>
				<option value="8">8</option>
			</select>

			<div class="score" id="score">Punkty: 0</div>
		</div>

		<div class="board-wrap">
			<svg id="board" viewBox="0 0 638 638" role="img" aria-label="Plansza gry w kulki">
				<g id="grid-layer"></g>
				<g id="path-layer"></g>
				<g id="balls-layer"></g>
			</svg>
			<div class="status" id="status"></div>
		</div>

		<div class="footer">Ułóż minimum 5 kulek w linii: poziomo, pionowo lub po skosie. Bonus: po zbiciu co najmniej 6 kulek nie pojawiają się 3 nowe kulki.</div>
	</div>

	<script>
		(() => {
			const SIZE = 11;
			const CELL = 54;
			const PADDING = 22;
			const RADIUS = 18;
			const SPAWN_PER_TURN = 3;
			const BONUS_CLEAR_THRESHOLD = 6;

			const SVG_NS = "http://www.w3.org/2000/svg";
			const gridLayer = document.getElementById("grid-layer");
			const pathLayer = document.getElementById("path-layer");
			const ballsLayer = document.getElementById("balls-layer");
			const boardWrap = document.querySelector(".board-wrap");
			const boardEl = document.getElementById("board");
			const newGameBtn = document.getElementById("new-game");
			const themeToggleBtn = document.getElementById("theme-toggle");
			const colorsSelect = document.getElementById("colors-count");
			const scoreEl = document.getElementById("score");
			const statusEl = document.getElementById("status");

			const PALETTE = [
				["#de5147", "#b3352f"],
				["#4b8de4", "#2f63ae"],
				["#3bae68", "#2d804d"],
				["#e0bb42", "#af8e2c"],
				["#9457d6", "#6f3ea6"],
				["#f28944", "#be6128"],
				["#42bfc6", "#2d8d92"],
				["#c85a99", "#96406f"]
			];

			let board = makeEmptyBoard();
			let selected = null;
			let score = 0;
			let colorCount = Number(colorsSelect.value);
			let animating = false;
			let gameOver = false;
			let isDarkTheme = false;
			let cellElements = [];
			let ballElements = new Map();

			restoreTheme();
			initBoardSvg();
			bindUi();
			applyResponsiveBoardSize();
			newGame();

			function bindUi() {
				newGameBtn.addEventListener("click", newGame);
				themeToggleBtn.addEventListener("click", () => {
					setTheme(!isDarkTheme);
				});
				colorsSelect.addEventListener("change", () => {
					colorCount = Number(colorsSelect.value);
					newGame();
				});
				window.addEventListener("resize", applyResponsiveBoardSize);
				window.addEventListener("orientationchange", applyResponsiveBoardSize);
			}

			function restoreTheme() {
				const saved = localStorage.getItem("kulki-theme");
				setTheme(saved === "dark", false);
			}

			function setTheme(useDark, persist = true) {
				isDarkTheme = useDark;
				document.body.classList.toggle("theme-dark", isDarkTheme);
				themeToggleBtn.textContent = isDarkTheme ? "Jasny motyw" : "Ciemny motyw";
				themeToggleBtn.setAttribute("aria-pressed", String(isDarkTheme));
				if (persist) {
					localStorage.setItem("kulki-theme", isDarkTheme ? "dark" : "light");
				}
			}

			function applyResponsiveBoardSize() {
				const vw = Math.max(320, window.innerWidth);
				const vh = Math.max(420, window.innerHeight);
				const sidePadding = vw < 700 ? 12 : 28;
				const headerApprox = vw < 640 ? 180 : 220;
				const target = Math.min(760, vw - sidePadding, vh - headerApprox);
				const size = Math.max(280, target);
				boardWrap.style.width = size + "px";
				boardEl.style.maxWidth = "100%";
			}

			function makeEmptyBoard() {
				return Array.from({ length: SIZE }, () => Array(SIZE).fill(null));
			}

			function initBoardSvg() {
				gridLayer.innerHTML = "";
				cellElements = Array.from({ length: SIZE }, () => Array(SIZE).fill(null));

				for (let r = 0; r < SIZE; r++) {
					for (let c = 0; c < SIZE; c++) {
						const rect = document.createElementNS(SVG_NS, "rect");
						rect.setAttribute("x", String(PADDING + c * CELL));
						rect.setAttribute("y", String(PADDING + r * CELL));
						rect.setAttribute("width", String(CELL));
						rect.setAttribute("height", String(CELL));
						rect.setAttribute("rx", "9");
						rect.setAttribute("class", `cell ${(r + c) % 2 ? "dark" : "light"}`);
						rect.dataset.row = String(r);
						rect.dataset.col = String(c);
						rect.addEventListener("pointerdown", onCellActivate);
						gridLayer.appendChild(rect);
						cellElements[r][c] = rect;
					}
				}
			}

			function cellCenter(row, col) {
				return {
					x: PADDING + col * CELL + CELL / 2,
					y: PADDING + row * CELL + CELL / 2
				};
			}

			function onCellActivate(ev) {
				if (ev.cancelable) {
					ev.preventDefault();
				}

				if (animating || gameOver) {
					return;
				}

				const row = Number(ev.currentTarget.dataset.row);
				const col = Number(ev.currentTarget.dataset.col);
				const hasBall = board[row][col] !== null;

				if (hasBall) {
					if (selected && selected.row === row && selected.col === col) {
						selected = null;
					} else {
						selected = { row, col };
					}
					drawBalls();
					clearPathPreview();
					return;
				}

				if (!selected) {
					indicateInvalid(row, col, "Najpierw wybierz kulkę.");
					return;
				}

				const from = { row: selected.row, col: selected.col };
				const to = { row, col };

				const path = findPath(from, to);
				if (!path) {
					indicateInvalid(row, col, "Brak drogi przez puste pola.");
					return;
				}

				animateBallMove(from, to, path, () => {
					executeMove(from, to);
				});
			}

			function executeMove(from, to) {
				const color = board[from.row][from.col];
				board[from.row][from.col] = null;
				board[to.row][to.col] = color;
				selected = null;
				clearPathPreview();
				drawBalls();

				const firstClear = clearCompletedLines();
				if (firstClear > 0) {
					status("Świetnie! Zbito " + firstClear + " kulek.");
				}

				setTimeout(() => {
					if (isBoardFull()) {
						finishGame();
						return;
					}

					if (firstClear >= BONUS_CLEAR_THRESHOLD) {
						status("Bonus: zbito " + firstClear + " kulek, więc nie dodano 3 nowych.");
						return;
					}

					const spawned = spawnRandomBalls(SPAWN_PER_TURN);
					if (spawned > 0) {
						status("Dodano " + spawned + " nowe kulki.");
					}

					setTimeout(() => {
						const secondClear = clearCompletedLines();
						if (secondClear > 0) {
							status("Nowe kulki utworzyły linię: +" + secondClear + " kulek.");
						}

						if (isBoardFull()) {
							finishGame();
						}
					}, 140);
				}, 120);
			}

			function clearCompletedLines() {
				const lines = collectLinesToClear();
				if (lines.length === 0) {
					return 0;
				}

				const toRemove = new Set();
				let earned = 0;

				for (const line of lines) {
					earned += pointsForLine(line.length);
					for (const [r, c] of line.cells) {
						toRemove.add(r + "," + c);
					}
				}

				for (const key of toRemove) {
					const [r, c] = key.split(",").map(Number);
					board[r][c] = null;
				}

				score += earned;
				updateScore();
				animatePopping(toRemove);
				return toRemove.size;
			}

			function collectLinesToClear() {
				const dirs = [
					[1, 0],
					[0, 1],
					[1, 1],
					[1, -1]
				];

				const lines = [];

				for (let r = 0; r < SIZE; r++) {
					for (let c = 0; c < SIZE; c++) {
						const color = board[r][c];
						if (color === null) {
							continue;
						}

						for (const [dr, dc] of dirs) {
							const pr = r - dr;
							const pc = c - dc;
							if (inBounds(pr, pc) && board[pr][pc] === color) {
								continue;
							}

							let rr = r;
							let cc = c;
							const cells = [];

							while (inBounds(rr, cc) && board[rr][cc] === color) {
								cells.push([rr, cc]);
								rr += dr;
								cc += dc;
							}

							if (cells.length >= 5) {
								lines.push({ cells, length: cells.length });
							}
						}
					}
				}

				return lines;
			}

			function pointsForLine(length) {
				const len = Math.max(5, Math.min(11, length));
				return len * len - 15;
			}

			function findPath(from, to) {
				const queue = [[from.row, from.col]];
				const visited = Array.from({ length: SIZE }, () => Array(SIZE).fill(false));
				const prev = Array.from({ length: SIZE }, () => Array(SIZE).fill(null));
				visited[from.row][from.col] = true;

				const dirs = [
					[1, 0],
					[-1, 0],
					[0, 1],
					[0, -1]
				];

				while (queue.length) {
					const [r, c] = queue.shift();
					if (r === to.row && c === to.col) {
						break;
					}

					for (const [dr, dc] of dirs) {
						const nr = r + dr;
						const nc = c + dc;
						if (!inBounds(nr, nc) || visited[nr][nc]) {
							continue;
						}

						if (board[nr][nc] !== null && !(nr === to.row && nc === to.col)) {
							continue;
						}

						visited[nr][nc] = true;
						prev[nr][nc] = [r, c];
						queue.push([nr, nc]);
					}
				}

				if (!visited[to.row][to.col]) {
					return null;
				}

				const path = [];
				let cur = [to.row, to.col];

				while (cur) {
					path.push({ row: cur[0], col: cur[1] });
					cur = prev[cur[0]][cur[1]];
				}

				path.reverse();
				previewPath(path);
				return path;
			}

			function animateBallMove(from, to, path, done) {
				const key = from.row + "," + from.col;
				const elem = ballElements.get(key);
				let finished = false;

				const finishMove = () => {
					if (finished) {
						return;
					}
					finished = true;
					elem?.classList.remove("moving");
					animating = false;
					done();
				};

				if (!elem) {
					finishMove();
					return;
				}

				animating = true;
				elem.classList.add("moving");

				const points = path.map(({ row, col }) => cellCenter(row, col));
				if (points.length < 2) {
					finishMove();
					return;
				}

				const segmentMs = 95;
				const duration = Math.max(90, (points.length - 1) * segmentMs);
				const start = performance.now();
				const fallbackTimer = setTimeout(finishMove, duration + 220);

				const step = (time) => {
					const elapsed = time - start;
					const t = Math.min(1, elapsed / duration);
					const raw = t * (points.length - 1);
					const seg = Math.min(points.length - 2, Math.floor(raw));
					const localT = raw - seg;

					const p0 = points[seg];
					const p1 = points[seg + 1];

					const x = p0.x + (p1.x - p0.x) * localT;
					const y = p0.y + (p1.y - p0.y) * localT;
					const bounce = -Math.abs(Math.sin((elapsed / segmentMs) * Math.PI)) * 6;

					elem.setAttribute("transform", `translate(${x} ${y + bounce})`);

					if (t < 1) {
						requestAnimationFrame(step);
					} else {
						clearTimeout(fallbackTimer);
						finishMove();
					}
				};

				requestAnimationFrame(step);
			}

			function drawBalls() {
				const newMap = new Map();

				for (let r = 0; r < SIZE; r++) {
					for (let c = 0; c < SIZE; c++) {
						const color = board[r][c];
						if (color === null) {
							continue;
						}

						const key = r + "," + c;
						let elem = ballElements.get(key);

						if (!elem) {
							elem = createBallElement(r, c, color);
							ballsLayer.appendChild(elem);
						} else {
							setBallColor(elem, color);
							positionBall(elem, r, c, 0);
						}

						if (selected && selected.row === r && selected.col === c) {
							elem.classList.add("selected");
						} else {
							elem.classList.remove("selected");
						}

						newMap.set(key, elem);
					}
				}

				for (const [oldKey, oldElem] of ballElements.entries()) {
					if (!newMap.has(oldKey)) {
						oldElem.remove();
					}
				}

				ballElements = newMap;
			}

			function createBallElement(r, c, colorIndex) {
				const outer = document.createElementNS(SVG_NS, "g");
				outer.setAttribute("class", "ball");

				const inner = document.createElementNS(SVG_NS, "g");
				inner.setAttribute("class", "ball-inner");

				const ring = document.createElementNS(SVG_NS, "circle");
				ring.setAttribute("r", String(RADIUS + 1));
				ring.setAttribute("fill", "#ffffffa8");

				const circle = document.createElementNS(SVG_NS, "circle");
				circle.setAttribute("r", String(RADIUS));
				circle.setAttribute("stroke-width", "2");

				const shine = document.createElementNS(SVG_NS, "ellipse");
				shine.setAttribute("cx", "-6");
				shine.setAttribute("cy", "-8");
				shine.setAttribute("rx", "7");
				shine.setAttribute("ry", "4");
				shine.setAttribute("fill", "#ffffffaa");

				inner.appendChild(ring);
				inner.appendChild(circle);
				inner.appendChild(shine);
				outer.appendChild(inner);

				setBallColor(outer, colorIndex);
				positionBall(outer, r, c, 0);
				return outer;
			}

			function setBallColor(ballElem, colorIndex) {
				const [fill, stroke] = PALETTE[colorIndex];
				const circle = ballElem.querySelector(".ball-inner circle:nth-of-type(2)");
				if (circle) {
					circle.setAttribute("fill", fill);
					circle.setAttribute("stroke", stroke);
				}
			}

			function positionBall(ballElem, row, col, offsetY) {
				const p = cellCenter(row, col);
				ballElem.setAttribute("transform", `translate(${p.x} ${p.y + offsetY})`);
			}

			function spawnRandomBalls(count) {
				const empties = getEmptyCells();
				if (empties.length === 0) {
					return 0;
				}

				shuffle(empties);
				const amount = Math.min(count, empties.length);

				for (let i = 0; i < amount; i++) {
					const { row, col } = empties[i];
					board[row][col] = randomColor();
				}

				drawBalls();
				return amount;
			}

			function getEmptyCells() {
				const cells = [];
				for (let r = 0; r < SIZE; r++) {
					for (let c = 0; c < SIZE; c++) {
						if (board[r][c] === null) {
							cells.push({ row: r, col: c });
						}
					}
				}
				return cells;
			}

			function randomColor() {
				return Math.floor(Math.random() * colorCount);
			}

			function shuffle(arr) {
				for (let i = arr.length - 1; i > 0; i--) {
					const j = Math.floor(Math.random() * (i + 1));
					[arr[i], arr[j]] = [arr[j], arr[i]];
				}
			}

			function previewPath(path) {
				clearPathPreview();
				for (let i = 1; i < path.length - 1; i++) {
					const { row, col } = path[i];
					cellElements[row][col].classList.add("path");
				}
			}

			function clearPathPreview() {
				for (let r = 0; r < SIZE; r++) {
					for (let c = 0; c < SIZE; c++) {
						cellElements[r][c].classList.remove("path");
					}
				}
			}

			function indicateInvalid(row, col, message) {
				const cell = cellElements[row][col];
				cell.classList.remove("invalid");
				void cell.getBoundingClientRect();
				cell.classList.add("invalid");
				status(message, true);
			}

			function animatePopping(setToRemove) {
				animating = true;

				for (const key of setToRemove) {
					const elem = ballElements.get(key);
					if (elem) {
						elem.classList.add("popping");
					}
				}

				setTimeout(() => {
					animating = false;
					drawBalls();
				}, 230);
			}

			function inBounds(r, c) {
				return r >= 0 && r < SIZE && c >= 0 && c < SIZE;
			}

			function updateScore() {
				scoreEl.textContent = "Punkty: " + score;
			}

			function status(msg, isError = false) {
				statusEl.textContent = msg;
				statusEl.style.color = isError ? "var(--danger)" : "var(--muted)";
			}

			function isBoardFull() {
				for (let r = 0; r < SIZE; r++) {
					for (let c = 0; c < SIZE; c++) {
						if (board[r][c] === null) {
							return false;
						}
					}
				}
				return true;
			}

			function finishGame() {
				gameOver = true;
				status("Koniec gry. Wynik: " + score + ". Kliknij 'Nowa gra'.", true);
			}

			function newGame() {
				board = makeEmptyBoard();
				selected = null;
				score = 0;
				animating = false;
				gameOver = false;
				updateScore();
				clearPathPreview();
				drawBalls();

				status("Start od pustej planszy. Za chwilę pojawią się pierwsze 3 kulki.");

				setTimeout(() => {
					if (gameOver) {
						return;
					}
					spawnRandomBalls(SPAWN_PER_TURN);
					status("Wybierz kulkę i kliknij wolne pole, jeśli istnieje droga.");
				}, 420);
			}
		})();
	</script>
</body>
</html>
