<script>
fetch("https://api.github.com/repos/TNovember7/AIFunLab/contents/")
  .then(r => r.json())
  .then(files => {
    const ul = document.getElementById("lista");
    files
      .filter(f => f.name.endsWith(".html") && f.name !== "index.html")
      .forEach(f => {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.href = f.name;
        a.textContent = f.name.replace(".html", "");
        li.appendChild(a);
        ul.appendChild(li);
      });
  });
</script>
