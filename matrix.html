<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Matrix Rain</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: monospace;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at top, #001800 0, #000 60%);
    }

    .overlay {
      position: fixed;
      left: 0;
      top: 0;
      width: 100%;
      padding: 8px 16px;
      color: #0f0;
      font-size: 12px;
      text-shadow: 0 0 4px #0f0;
      pointer-events: none;
      mix-blend-mode: screen;
    }
  </style>
</head>
<body>
  <canvas id="matrix"></canvas>
  <div class="overlay">Matrix-style console rain — ESC, by wyjść z pełnego ekranu.</div>

  <script>
    const canvas = document.getElementById("matrix");
    const ctx = canvas.getContext("2d");

    let width = window.innerWidth;
    let height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;

    // Zestaw znaków: cyfry, litery, znaki konsoli
    const chars = "01#$%&*+/-_<>[]{}|ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const charArray = chars.split("");

    // Rozmiar czcionki i liczba kolumn
    let fontSize = 18;
    let columns = Math.floor(width / fontSize);

    // Pozycja "kropel" w każdej kolumnie
    let drops = Array.from({ length: columns }, () => Math.floor(Math.random() * -50));

    function draw() {
      // Półprzezroczyste tło dla efektu smugi
      ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
      ctx.fillRect(0, 0, width, height);

      ctx.font = fontSize + "px monospace";

      for (let i = 0; i < columns; i++) {
        const text = charArray[Math.floor(Math.random() * charArray.length)];
        const x = i * fontSize;
        const y = drops[i] * fontSize;

        // Główna kropla jaśniejsza, reszta ciemniejsza
        const head = drops[i] === 0;
        ctx.fillStyle = head ? "#ccffcc" : "#0f0";

        ctx.fillText(text, x, y);

        // Reset kropli po wyjściu poza dół ekranu z losową szansą
        if (y > height && Math.random() > 0.975) {
          drops[i] = Math.floor(Math.random() * -20);
        } else {
          drops[i]++;
        }
      }

      requestAnimationFrame(draw);
    }

    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
      columns = Math.floor(width / fontSize);
      drops = Array.from({ length: columns }, () => Math.floor(Math.random() * -50));
    }

    window.addEventListener("resize", resize);

    // Opcjonalnie: wejście w fullscreen po kliknięciu
    canvas.addEventListener("click", () => {
      if (!document.fullscreenElement) {
        canvas.requestFullscreen?.();
      }
    });

    draw();
  </script>
</body>
</html>
