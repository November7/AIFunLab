<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ball Collisions with Gravity</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      color: #eee;
      font-family: system-ui, sans-serif;
    }
    #wrapper {
      text-align: center;
    }
    #counter, #timer {
      font-size: 20px;
      margin-bottom: 5px;
    }
    canvas {
      background: #000;
      border-radius: 50%;
      box-shadow: 0 0 20px rgba(0,0,0,0.8);
    }
  </style>
</head>
<body>
  <div id="wrapper">
    <div id="counter">Balls count: 0</div>
    <div id="timer">Time: 0.00 s</div>
    <canvas id="sim" width="600" height="600"></canvas>
  </div>

  <script>
    const canvas = document.getElementById('sim');
    const ctx = canvas.getContext('2d');
    const counterEl = document.getElementById('counter');
    const timerEl = document.getElementById('timer');

    const W = canvas.width;
    const H = canvas.height;
    const cx = W / 2;
    const cy = H / 2;
    const R = 260;
    const BALL_RADIUS = 10;
    const INITIAL_BALLS = 2;
    const GRAVITY = 0.05;

    const balls = [];
    let running = true;

    let startTime = performance.now();
    let elapsed = 0;

    function randomColor() {
      const r = Math.floor(Math.random() * 200 + 30);
      const g = Math.floor(Math.random() * 200 + 30);
      const b = Math.floor(Math.random() * 200 + 30);
      return `rgb(${r},${g},${b})`;
    }

    // Random spawn only in upper half of the circle
    function randomInCircle(radius) {
      let x, y;
      do {
        const angle = Math.random() * Math.PI * 2;
        const r = Math.sqrt(Math.random()) * (radius - BALL_RADIUS);
        x = cx + r * Math.cos(angle);
        y = cy + r * Math.sin(angle);
      } while (y > cy);
      return { x, y };
    }

    function randomVelocity() {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1 + Math.random() * 1.5;
      return {
        vx: speed * Math.cos(angle),
        vy: speed * Math.sin(angle)
      };
    }

    function createBall() {
      let pos;
      let tries = 0;
      do {
        pos = randomInCircle(R);
        tries++;
        if (tries > 50) break;
      } while (balls.some(b => Math.hypot(b.x - pos.x, b.y - pos.y) < 2 * BALL_RADIUS));

      const vel = randomVelocity();
      balls.push({
        x: pos.x,
        y: pos.y,
        vx: vel.vx,
        vy: vel.vy,
        r: BALL_RADIUS,
        color: randomColor()
      });
      updateCounter();
    }

    function updateCounter() {
      counterEl.textContent = 'Balls count: ' + balls.length;
    }

    // Check if the circle is filled
    function isCircleFull() {
      const totalBallArea = balls.length * BALL_RADIUS * BALL_RADIUS;
      const circleArea = R * R;
      return totalBallArea >= circleArea;
    }

    for (let i = 0; i < INITIAL_BALLS; i++) createBall();

    function handleWallCollision(ball) {
      const dx = ball.x - cx;
      const dy = ball.y - cy;
      const dist = Math.hypot(dx, dy);
      const maxDist = R - ball.r;

      if (dist > maxDist) {
        const nx = dx / dist;
        const ny = dy / dist;

        ball.x = cx + nx * maxDist;
        ball.y = cy + ny * maxDist;

        const dot = ball.vx * nx + ball.vy * ny;
        ball.vx -= 2 * dot * nx;
        ball.vy -= 2 * dot * ny;
      }
    }

    function handleBallCollision(b1, b2) {
      const dx = b2.x - b1.x;
      const dy = b2.y - b1.y;
      const dist = Math.hypot(dx, dy);
      const minDist = b1.r + b2.r;

      if (dist > 0 && dist < minDist) {
        const nx = dx / dist;
        const ny = dy / dist;

        const p1 = b1.vx * nx + b1.vy * ny;
        const p2 = b2.vx * nx + b2.vy * ny;

        const p1After = p2;
        const p2After = p1;

        b1.vx += (p1After - p1) * nx;
        b1.vy += (p1After - p1) * ny;
        b2.vx += (p2After - p2) * nx;
        b2.vy += (p2After - p2) * ny;

        const overlap = minDist - dist;
        b1.x -= nx * overlap / 2;
        b1.y -= ny * overlap / 2;
        b2.x += nx * overlap / 2;
        b2.y += ny * overlap / 2;

        return true;
      }
      return false;
    }

    function update() {
      for (const b of balls) {
        b.vy += GRAVITY;
        b.x += b.vx;
        b.y += b.vy;
        handleWallCollision(b);
      }

      let collisionHappened = false;
      for (let i = 0; i < balls.length; i++) {
        for (let j = i + 1; j < balls.length; j++) {
          if (handleBallCollision(balls[i], balls[j])) {
            collisionHappened = true;
          }
        }
      }

      if (collisionHappened) createBall();
    }

    function drawCircle() {
      ctx.beginPath();
      ctx.arc(cx, cy, R, 0, Math.PI * 2);
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 3;
      ctx.stroke();
    }

    function drawBalls() {
      for (const b of balls) {
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fillStyle = b.color;
        ctx.fill();
      }
    }

    function loop() {
      if (!running) return;

      ctx.clearRect(0, 0, W, H);
      drawCircle();
      update();
      drawBalls();

      // Update timer
      elapsed = (performance.now() - startTime) / 1000;
      timerEl.textContent = 'Time: ' + elapsed.toFixed(2) + ' s';

      // Stop condition
      if (isCircleFull()) {
        running = false;
        timerEl.textContent += ' (stopped)';
        return;
      }

      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
