<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<title>Centryczny Labirynt – grube ściany, stabilna fizyka</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #fff;
    font-family: system-ui, sans-serif;
    overflow: hidden;
  }
  #hud {
    padding: 10px 20px;
    background: #000;
    font-size: 18px;
    font-weight: 600;
  }
  #time {
    color: #0ff;
  }
  canvas {
    display: block;
  }
</style>
</head>
<body>

<div id="hud">Czas: <span id="time">0.000 s</span></div>
<div> Nieudana próba - kolejne podejście z github copilot pro</div>
<canvas id="c"></canvas>

<script>
(() => {
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");
  const timeEl = document.getElementById("time");

  let W, H, cx, cy, scale;
  let startTime = null;
  let stopTime = null;
  let running = true;

  const ballSpeed = 195;
  const ballRadius = 5;
  const numBalls = 5;

  const rings = [];
  const ringGaps = [];
  const radialWalls = [];

  const wallThickness = 8;      // kolizyjna grubość ściany
  const wallHalf = wallThickness / 2;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    W = canvas.width;
    H = canvas.height;
    cx = W / 2;
    cy = H / 2;

    const margin = 40;
    const ringCount = 7;
    const baseR = 40;
    const step = 45;
    const baseMaxRadius = baseR + (ringCount - 1) * step;
    const maxPossibleRadius = Math.min(W, H) / 2 - margin;
    scale = maxPossibleRadius / baseMaxRadius;
  }
  window.addEventListener("resize", () => {
    resize();
    generateMaze();
  });
  resize();

  function angleNorm(a) {
    while (a <= -Math.PI) a += 2 * Math.PI;
    while (a > Math.PI) a -= 2 * Math.PI;
    return a;
  }

  function angleInGap(theta, gaps) {
    theta = angleNorm(theta);
    for (const g of gaps) {
      let s = angleNorm(g.start);
      let e = angleNorm(g.end);
      if (s <= e) {
        if (theta >= s && theta <= e) return true;
      } else {
        if (theta >= s || theta <= e) return true;
      }
    }
    return false;
  }

  function generateMaze() {
    rings.length = 0;
    ringGaps.length = 0;
    radialWalls.length = 0;

    const ringCount = 7;
    const baseR = 40;
    const step = 45;

    for (let i = 0; i < ringCount; i++) {
      rings.push((baseR + i * step) * scale);
    }

    const baseAngle = -0.2;
    const shift = 0.45;

    for (let i = 0; i < ringCount; i++) {
      const a1 = baseAngle + i * shift;
      ringGaps.push([
        { start: a1, end: a1 + 0.35 }
      ]);
    }

    ringGaps[ringCount - 1].push(
      { start: baseAngle + (ringCount - 1) * shift + 0.5, end: baseAngle + (ringCount - 1) * shift + 0.9 }
    );

    const wallAngles = [-2.4, -1.7, -1.0, -0.3, 0.4, 1.1, 1.8, 2.5];

    for (let i = 0; i < ringCount - 1; i++) {
      const gapStart = ringGaps[i][0].start;
      const gapEnd = ringGaps[i][0].end;

      for (const a of wallAngles) {
        const aa = a + i * 0.3;
        if (aa < gapStart - 0.2 || aa > gapEnd + 0.2) {
          radialWalls.push({
            angle: aa,
            r1: rings[i],
            r2: rings[i + 1]
          });
        }
      }
    }
  }

  generateMaze();

  const balls = [];

  function createBalls() {
    balls.length = 0;
    const colors = ["#0ff", "#f0f", "#ff0", "#0f0", "#f00", "#08f"];
    for (let i = 0; i < numBalls; i++) {
      const a = Math.random() * Math.PI * 2;
      balls.push({
        x: cx + Math.random() * 10 - 5,
        y: cy + Math.random() * 10 - 5,
        vx: Math.cos(a) * ballSpeed,
        vy: Math.sin(a) * ballSpeed,
        r: ballRadius,
        color: colors[i % colors.length]
      });
    }
  }

  createBalls();

  function reflect(ball, nx, ny) {
    const dot = ball.vx * nx + ball.vy * ny;
    ball.vx -= 2 * dot * nx;
    ball.vy -= 2 * dot * ny;
  }

  function handleBallMaze(ball, dt) {
    const steps = 24;
    const stepDt = dt / steps;

    for (let s = 0; s < steps; s++) {
      const oldX = ball.x;
      const oldY = ball.y;

      ball.x += ball.vx * stepDt;
      ball.y += ball.vy * stepDt;

      let dx = ball.x - cx;
      let dy = ball.y - cy;
      let r = Math.hypot(dx, dy);
      let theta = Math.atan2(dx, dy); // uwaga: zamiana, żeby normal był poprawny

      // --- grube pierścienie ---
      for (let i = 0; i < rings.length; i++) {
        const R = rings[i];
        const inner = R - wallHalf;
        const outer = R + wallHalf;

        const prevR = Math.hypot(oldX - cx, oldY - cy);
        const crossed = (prevR - inner) * (r - inner) < 0 || (prevR - outer) * (r - outer) < 0;

        if (crossed && !angleInGap(Math.atan2(ball.y - cy, ball.x - cx), ringGaps[i])) {
          // odbicie od zewnętrznej powierzchni
          let targetR;
          if (r > R) {
            targetR = outer + ball.r + 0.5;
          } else {
            targetR = inner - ball.r - 0.5;
          }

          const ndx = ball.x - cx;
          const ndy = ball.y - cy;
          const len = Math.hypot(ndx, ndy) || 1;
          const nx = ndx / len;
          const ny = ndy / len;

          reflect(ball, nx, ny);

          ball.x = cx + nx * targetR;
          ball.y = cy + ny * targetR;

          dx = ball.x - cx;
          dy = ball.y - cy;
          r = Math.hypot(dx, dy);
          theta = Math.atan2(dx, dy);
        }
      }

      // --- grube ściany radialne ---
      for (const w of radialWalls) {
        if (r < w.r1 - wallHalf || r > w.r2 + wallHalf) continue;

        const diff = angleNorm(Math.atan2(ball.y - cy, ball.x - cx) - w.angle);
        const angTol = (wallHalf + ball.r) / (r || 1);

        if (Math.abs(diff) < angTol) {
          // normal prostopadły do ściany
          const nx = Math.cos(w.angle + Math.PI / 2);
          const ny = Math.sin(w.angle + Math.PI / 2);

          reflect(ball, nx, ny);

          // odsuniecie na zewnątrz "pasa" ściany
          const sign = diff > 0 ? 1 : -1;
          const newAngle = w.angle + sign * angTol;
          ball.x = cx + Math.cos(newAngle) * r;
          ball.y = cy + Math.sin(newAngle) * r;

          dx = ball.x - cx;
          dy = ball.y - cy;
          r = Math.hypot(dx, dy);
          theta = Math.atan2(dx, dy);
        }
      }

      // --- twarda granica zewnętrzna ---
      const maxR = rings[rings.length - 1] + wallHalf + 5;
      if (r > maxR) {
        const ndx = ball.x - cx;
        const ndy = ball.y - cy;
        const len = Math.hypot(ndx, ndy) || 1;
        const nx = ndx / len;
        const ny = ndy / len;

        reflect(ball, nx, ny);

        const targetR = rings[rings.length - 1] + wallHalf + ball.r + 0.5;
        ball.x = cx + nx * targetR;
        ball.y = cy + ny * targetR;
      }
    }
  }

  function handleBallBall() {
    for (let i = 0; i < balls.length; i++) {
      for (let j = i + 1; j < balls.length; j++) {
        const a = balls[i], b = balls[j];
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const dist = Math.hypot(dx, dy);
        const minD = a.r + b.r;

        if (dist > 0 && dist < minD) {
          const nx = dx / dist;
          const ny = dy / dist;

          const dvx = a.vx - b.vx;
          const dvy = a.vy - b.vy;
          const rel = dvx * nx + dvy * ny;
          if (rel > 0) continue;

          const imp = -2 * rel / 2;
          const ix = imp * nx;
          const iy = imp * ny;

          a.vx += ix;
          a.vy += iy;
          b.vx -= ix;
          b.vy -= iy;

          const overlap = (minD - dist) / 2;
          a.x -= nx * overlap;
          a.y -= ny * overlap;
          b.x += nx * overlap;
          b.y += ny * overlap;
        }
      }
    }
  }

  function checkExit(ball) {
    const dx = ball.x - cx;
    const dy = ball.y - cy;
    const r = Math.hypot(dx, dy);
    const th = Math.atan2(dy, dx);
    const lastRing = ringGaps.length - 1;

    if (r > rings[rings.length - 1] + wallHalf + 5) {
      if (angleInGap(th, ringGaps[lastRing])) return true;
    }
    return false;
  }

  function update(dt) {
    if (!running) return;

    for (const b of balls) handleBallMaze(b, dt);
    handleBallBall();

    for (const b of balls) {
      if (checkExit(b)) {
        running = false;
        stopTime = performance.now();
      }
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    ctx.strokeStyle = "#fff";
    ctx.lineWidth = 3;

    ctx.save();
    ctx.translate(cx, cy);

    // pierścienie (wizualnie cienkie, fizycznie grube)
    for (let i = 0; i < rings.length; i++) {
      const R = rings[i];
      const gaps = ringGaps[i];
      const step = Math.PI / 80;
      let segStart = null;

      for (let a = -Math.PI; a <= Math.PI + 0.001; a += step) {
        const open = angleInGap(a, gaps);
        if (!open) {
          if (segStart === null) segStart = a;
        } else {
          if (segStart !== null) {
            ctx.beginPath();
            ctx.arc(0, 0, R, segStart, a);
            ctx.stroke();
            segStart = null;
          }
        }
      }
      if (segStart !== null) {
        ctx.beginPath();
        ctx.arc(0, 0, R, segStart, Math.PI);
        ctx.stroke();
      }
    }

    // ściany działowe (wizualnie cienkie)
    for (const w of radialWalls) {
      ctx.beginPath();
      ctx.moveTo(Math.cos(w.angle) * w.r1, Math.sin(w.angle) * w.r1);
      ctx.lineTo(Math.cos(w.angle) * w.r2, Math.sin(w.angle) * w.r2);
      ctx.stroke();
    }

    ctx.restore();

    // piłki
    for (const b of balls) {
      ctx.beginPath();
      ctx.fillStyle = b.color;
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  let lastT = null;
  function loop(t) {
    if (startTime === null) startTime = t;
    const dt = (t - (lastT || t)) / 1000;
    lastT = t;

    if (running) {
      update(dt);
      draw();
      timeEl.textContent = ((t - startTime) / 1000).toFixed(3) + " s";
      requestAnimationFrame(loop);
    } else {
      draw();
      timeEl.textContent = ((stopTime - startTime) / 1000).toFixed(3) + " s";
    }
  }

  requestAnimationFrame(loop);
})();
</script>

</body>
</html>
