<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<title>Chaotyczny Labirynt Kołowy</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #fff;
    font-family: system-ui, sans-serif;
    overflow: hidden;
  }
  #hud {
    padding: 10px 20px;
    background: #000;
    font-size: 18px;
    font-weight: 600;
  }
  #time {
    color: #0ff;
  }
  canvas {
    display: block;
  }
</style>
</head>
<body>

<div id="hud">Czas: <span id="time">0.000 s</span></div>
<canvas id="c"></canvas>

<script>
(() => {
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");
  const timeEl = document.getElementById("time");

  let W, H, cx, cy, scale;
  let startTime = null;
  let stopTime = null;
  let running = true;

  const ballSpeed = 250;
  const ballRadius = 5;
  const numBalls = 5;

  const rings = [];
  const ringGaps = [];
  const radialSegments = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    W = canvas.width;
    H = canvas.height;
    cx = W / 2;
    cy = H / 2;
    scale = Math.min(W, H) / 500;
  }
  window.addEventListener("resize", resize);
  resize();

  function rand(a, b) {
    return a + Math.random() * (b - a);
  }

  function generateMaze() {
    rings.length = 0;
    ringGaps.length = 0;
    radialSegments.length = 0;

    const ringCount = 12;
    const baseR = 40;
    const step = 25;

    for (let i = 0; i < ringCount; i++) {
      const R = (baseR + i * step) * scale;
      rings.push(R);

      const gaps = [];
      const gapCount = Math.floor(rand(2, 5));
      for (let g = 0; g < gapCount; g++) {
        const a1 = rand(-Math.PI, Math.PI);
        const a2 = a1 + rand(0.2, 0.6);
        gaps.push({ start: a1, end: a2 });
      }
      ringGaps.push(gaps);
    }

    const segCount = 60;
    for (let i = 0; i < segCount; i++) {
      const angle = rand(-Math.PI, Math.PI);
      const r1 = rand(baseR * scale, (baseR + ringCount * step) * scale);
      const r2 = r1 + rand(10, 25) * scale;
      radialSegments.push({ angle, r1, r2 });
    }

    const outerR = rings[rings.length - 1];
    exitGap = { start: -Math.PI * 0.4, end: -Math.PI * 0.1 };
    exitRadius = outerR;
  }

  generateMaze();

  function angleNorm(a) {
    while (a <= -Math.PI) a += 2 * Math.PI;
    while (a > Math.PI) a -= 2 * Math.PI;
    return a;
  }

  function angleInGap(theta, gaps) {
    theta = angleNorm(theta);
    for (const g of gaps) {
      let s = angleNorm(g.start);
      let e = angleNorm(g.end);
      if (s <= e) {
        if (theta >= s && theta <= e) return true;
      } else {
        if (theta >= s || theta <= e) return true;
      }
    }
    return false;
  }

  const balls = [];

  function createBalls() {
    balls.length = 0;
    const colors = ["#0ff", "#f0f", "#ff0", "#0f0", "#f00", "#08f"];
    for (let i = 0; i < numBalls; i++) {
      const a = rand(0, Math.PI * 2);
      balls.push({
        x: cx + rand(-10, 10),
        y: cy + rand(-10, 10),
        vx: Math.cos(a) * ballSpeed,
        vy: Math.sin(a) * ballSpeed,
        r: ballRadius,
        color: colors[i % colors.length]
      });
    }
  }

  createBalls();

  function reflectRadial(ball, R) {
    const dx = ball.x - cx;
    const dy = ball.y - cy;
    const len = Math.hypot(dx, dy) || 1;
    const nx = dx / len;
    const ny = dy / len;
    const dot = ball.vx * nx + ball.vy * ny;
    ball.vx -= 2 * dot * nx;
    ball.vy -= 2 * dot * ny;
    ball.x = cx + nx * (R + (ball.r + 0.5) * (len > R ? 1 : -1));
    ball.y = cy + ny * (R + (ball.r + 0.5) * (len > R ? 1 : -1));
  }

  function reflectTangential(ball, angle) {
    const nx = Math.cos(angle + Math.PI / 2);
    const ny = Math.sin(angle + Math.PI / 2);
    const dot = ball.vx * nx + ball.vy * ny;
    ball.vx -= 2 * dot * nx;
    ball.vy -= 2 * dot * ny;
  }

  function handleBallMaze(ball) {
    const dx = ball.x - cx;
    const dy = ball.y - cy;
    let r = Math.hypot(dx, dy);
    let theta = Math.atan2(dy, dx);

    for (let i = 0; i < rings.length; i++) {
      const R = rings[i];
      if (Math.abs(r - R) < ball.r + 1) {
        if (!angleInGap(theta, ringGaps[i])) {
          reflectRadial(ball, R);
          const ndx = ball.x - cx;
          const ndy = ball.y - cy;
          r = Math.hypot(ndx, ndy);
          theta = Math.atan2(ndy, ndx);
        }
      }
    }

    for (const s of radialSegments) {
      if (r < s.r1 || r > s.r2) continue;
      const diff = Math.abs(angleNorm(theta - s.angle));
      const th = ball.r / (r || 1);
      if (diff < th) {
        reflectTangential(ball, s.angle);
        const sign = theta > s.angle ? 1 : -1;
        const newTheta = s.angle + sign * th;
        ball.x = cx + Math.cos(newTheta) * r;
        ball.y = cy + Math.sin(newTheta) * r;
      }
    }
  }

  function handleBallBall() {
    for (let i = 0; i < balls.length; i++) {
      for (let j = i + 1; j < balls.length; j++) {
        const a = balls[i], b = balls[j];
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const dist = Math.hypot(dx, dy);
        const minD = a.r + b.r;
        if (dist > 0 && dist < minD) {
          const nx = dx / dist;
          const ny = dy / dist;
          const dvx = a.vx - b.vx;
          const dvy = a.vy - b.vy;
          const rel = dvx * nx + dvy * ny;
          if (rel > 0) continue;
          const imp = -2 * rel / 2;
          const ix = imp * nx;
          const iy = imp * ny;
          a.vx += ix; a.vy += iy;
          b.vx -= ix; b.vy -= iy;
          const overlap = (minD - dist) / 2;
          a.x -= nx * overlap;
          a.y -= ny * overlap;
          b.x += nx * overlap;
          b.y += ny * overlap;
        }
      }
    }
  }

  function checkExit(ball) {
    const dx = ball.x - cx;
    const dy = ball.y - cy;
    const r = Math.hypot(dx, dy);
    const th = Math.atan2(dy, dx);
    if (r > exitRadius + 5) {
      if (angleInGap(th, [exitGap])) return true;
    }
    return false;
  }

  function update(dt) {
    if (!running) return;

    for (const b of balls) {
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      handleBallMaze(b);
    }

    handleBallBall();

    for (const b of balls) {
      if (checkExit(b)) {
        running = false;
        stopTime = performance.now();
      }
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    ctx.strokeStyle = "#fff";
    ctx.lineWidth = 3;

    ctx.save();
    ctx.translate(cx, cy);

    for (let i = 0; i < rings.length; i++) {
      const R = rings[i];
      const gaps = ringGaps[i];

      const step = Math.PI / 80;
      let segStart = null;

      for (let a = -Math.PI; a <= Math.PI + 0.001; a += step) {
        const open = angleInGap(a, gaps);
        if (!open) {
          if (segStart === null) segStart = a;
        } else {
          if (segStart !== null) {
            ctx.beginPath();
            ctx.arc(0, 0, R, segStart, a);
            ctx.stroke();
            segStart = null;
          }
        }
      }
      if (segStart !== null) {
        ctx.beginPath();
        ctx.arc(0, 0, R, segStart, Math.PI);
        ctx.stroke();
      }
    }

    for (const s of radialSegments) {
      ctx.beginPath();
      ctx.moveTo(Math.cos(s.angle) * s.r1, Math.sin(s.angle) * s.r1);
      ctx.lineTo(Math.cos(s.angle) * s.r2, Math.sin(s.angle) * s.r2);
      ctx.stroke();
    }

    ctx.strokeStyle = "#0f0";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(0, 0, exitRadius, exitGap.start, exitGap.end);
    ctx.stroke();

    ctx.restore();

    for (const b of balls) {
      ctx.beginPath();
      ctx.fillStyle = b.color;
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function loop(t) {
    if (startTime === null) startTime = t;
    const dt = (t - (lastT || t)) / 1000;
    lastT = t;

    if (running) {
      update(dt);
      draw();
      timeEl.textContent = ((t - startTime) / 1000).toFixed(3) + " s";
      requestAnimationFrame(loop);
    } else {
      draw();
      timeEl.textContent = ((stopTime - startTime) / 1000).toFixed(3) + " s";
    }
  }

  let lastT = null;
  requestAnimationFrame(loop);
})();
</script>

</body>
</html>
