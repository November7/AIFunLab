<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<title>Centryczny Labirynt – grube ściany, stabilna fizyka</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #fff;
    font-family: system-ui, sans-serif;
    overflow: hidden;
  }
  #hud {
    padding: 10px 20px;
    background: #000;
    font-size: 18px;
    font-weight: 600;
  }
  #time {
    color: #0ff;
  }
  canvas {
    display: block;
  }
</style>
</head>
<body>

<div id="hud">Czas: <span id="time">0.000 s</span></div>
<canvas id="c"></canvas>

<script>
(() => {
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");
  const timeEl = document.getElementById("time");

  let W, H, cx, cy, scale;
  let startTime = null;
  let stopTime = null;
  let running = true;

  const BALL_SPEED = 235;
  const BALL_RADIUS = 5;
  const NUM_BALLS = 5;

  const rings = [];
  const ringGaps = [];
  const radialWalls = [];

  const WALL_THICKNESS = 10;
  const WALL_HALF = WALL_THICKNESS / 2;
  const MAX_STEP_TRAVEL = 1.2;
  const SOLVER_ITERS = 4;
  const PUSH_EPS = 0.05;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    W = canvas.width;
    H = canvas.height;
    cx = W / 2;
    cy = H / 2;

    const margin = 36;
    const ringCount = 6;
    const baseR = 46;
    const step = 52;
    const baseMaxRadius = baseR + (ringCount - 1) * step;
    const maxPossibleRadius = Math.min(W, H) / 2 - margin;
    scale = maxPossibleRadius / baseMaxRadius;
  }
  window.addEventListener("resize", () => {
    resize();
    generateMaze();
  });
  resize();

  function angleNorm(a) {
    while (a <= -Math.PI) a += 2 * Math.PI;
    while (a > Math.PI) a -= 2 * Math.PI;
    return a;
  }

  function angleDelta(a, b) {
    return angleNorm(a - b);
  }

  function angleInGap(theta, gaps) {
    theta = angleNorm(theta);
    for (const g of gaps) {
      let s = angleNorm(g.start);
      let e = angleNorm(g.end);
      if (s <= e) {
        if (theta >= s && theta <= e) return true;
      } else {
        if (theta >= s || theta <= e) return true;
      }
    }
    return false;
  }

  function generateMaze() {
    rings.length = 0;
    ringGaps.length = 0;
    radialWalls.length = 0;

    const ringCount = 6;
    const baseR = 46;
    const step = 52;

    for (let i = 0; i < ringCount; i++) {
      rings.push((baseR + i * step) * scale);
    }

    const pathAngles = [-2.3, -1.62, -0.9, -0.12, 0.72, 1.58];
    const pathGapSize = 0.56;
    for (let i = 0; i < ringCount; i++) {
      const aMain = pathAngles[i];
      const g = [
        { start: aMain - pathGapSize / 2, end: aMain + pathGapSize / 2 }
      ];

      const extraA = angleNorm(aMain + 1.5 - (i % 2) * 0.35);
      g.push({ start: extraA - 0.18, end: extraA + 0.18 });

      if (i % 2 === 1) {
        const extraB = angleNorm(aMain - 1.9);
        g.push({ start: extraB - 0.14, end: extraB + 0.14 });
      }

      ringGaps.push(g);
    }

    ringGaps[ringCount - 1].push({ start: -2.95, end: -2.55 });

    const wallAngles = [];
    const segmentsPerBand = 14;
    for (let j = 0; j < segmentsPerBand; j++) {
      wallAngles.push(-Math.PI + (2 * Math.PI * j) / segmentsPerBand);
    }

    for (let i = 0; i < ringCount - 1; i++) {
      for (const a of wallAngles) {
        const aa = angleNorm(a + i * 0.21 + ((i + Math.round((a + Math.PI) * 10)) % 3 === 0 ? 0.08 : -0.06));
        const d0 = Math.abs(angleDelta(aa, pathAngles[i]));
        const d1 = Math.abs(angleDelta(aa, pathAngles[i + 1]));
        if (d0 < 0.48 || d1 < 0.48) continue;

        if (Math.abs(angleDelta(aa, pathAngles[i] + Math.PI)) < 0.18) continue;

        radialWalls.push({ angle: aa, r1: rings[i], r2: rings[i + 1] });
      }
    }
  }

  generateMaze();

  const balls = [];

  function createBalls() {
    balls.length = 0;
    const colors = ["#0ff", "#f0f", "#ff0", "#0f0", "#f00", "#08f"];
    for (let i = 0; i < NUM_BALLS; i++) {
      const a = Math.random() * Math.PI * 2;
      balls.push({
        x: cx + Math.random() * 12 - 6,
        y: cy + Math.random() * 12 - 6,
        vx: Math.cos(a) * BALL_SPEED,
        vy: Math.sin(a) * BALL_SPEED,
        r: BALL_RADIUS,
        color: colors[i % colors.length]
      });
    }
  }

  createBalls();

  function reflect(ball, nx, ny) {
    const dot = ball.vx * nx + ball.vy * ny;
    ball.vx -= 2 * dot * nx;
    ball.vy -= 2 * dot * ny;
  }

  function resolveRingCollision(ball, R, gaps) {
    const dx = ball.x - cx;
    const dy = ball.y - cy;
    const dist = Math.hypot(dx, dy);
    if (dist < 1e-8) return false;

    const theta = Math.atan2(dy, dx);
    if (angleInGap(theta, gaps)) return false;

    const limit = WALL_HALF + ball.r;
    const off = dist - R;
    if (Math.abs(off) >= limit) return false;

    const sign = off >= 0 ? 1 : -1;
    const nx = (dx / dist) * sign;
    const ny = (dy / dist) * sign;
    const penetration = limit - Math.abs(off) + PUSH_EPS;

    ball.x += nx * penetration;
    ball.y += ny * penetration;

    const vn = ball.vx * nx + ball.vy * ny;
    if (vn < 0) reflect(ball, nx, ny);
    return true;
  }

  function resolveRadialWallCollision(ball, w) {
    const ux = Math.cos(w.angle);
    const uy = Math.sin(w.angle);

    const px = ball.x - cx;
    const py = ball.y - cy;

    const t = px * ux + py * uy;
    const clampedT = Math.max(w.r1, Math.min(w.r2, t));
    const qx = ux * clampedT;
    const qy = uy * clampedT;

    const dx = px - qx;
    const dy = py - qy;
    const dist = Math.hypot(dx, dy);
    const limit = WALL_HALF + ball.r;
    if (dist >= limit) return false;

    let nx, ny;
    if (dist > 1e-8) {
      nx = dx / dist;
      ny = dy / dist;
    } else {
      nx = -Math.sin(w.angle);
      ny = Math.cos(w.angle);
    }

    const penetration = limit - dist + PUSH_EPS;
    ball.x += nx * penetration;
    ball.y += ny * penetration;

    const vn = ball.vx * nx + ball.vy * ny;
    if (vn < 0) reflect(ball, nx, ny);
    return true;
  }

  function solveBallWallOverlaps(ball) {
    for (let iter = 0; iter < SOLVER_ITERS; iter++) {
      let touched = false;

      for (let i = 0; i < rings.length; i++) {
        if (resolveRingCollision(ball, rings[i], ringGaps[i])) touched = true;
      }
      for (const w of radialWalls) {
        if (resolveRadialWallCollision(ball, w)) touched = true;
      }

      if (!touched) break;
    }
  }

  function handleBallBall() {
    for (let i = 0; i < balls.length; i++) {
      for (let j = i + 1; j < balls.length; j++) {
        const a = balls[i], b = balls[j];
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const dist = Math.hypot(dx, dy);
        const minD = a.r + b.r;

        if (dist > 0 && dist < minD) {
          const nx = dx / dist;
          const ny = dy / dist;

          const dvx = a.vx - b.vx;
          const dvy = a.vy - b.vy;
          const rel = dvx * nx + dvy * ny;
          if (rel > 0) continue;

          const imp = -2 * rel / 2;
          const ix = imp * nx;
          const iy = imp * ny;

          a.vx += ix;
          a.vy += iy;
          b.vx -= ix;
          b.vy -= iy;

          const overlap = (minD - dist) / 2;
          a.x -= nx * overlap;
          a.y -= ny * overlap;
          b.x += nx * overlap;
          b.y += ny * overlap;
        }
      }
    }
  }

  function checkExit(ball) {
    const dx = ball.x - cx;
    const dy = ball.y - cy;
    const r = Math.hypot(dx, dy);
    const th = Math.atan2(dy, dx);
    const lastRing = rings.length - 1;
    return r > rings[lastRing] + WALL_HALF + ball.r + 1 && angleInGap(th, ringGaps[lastRing]);
  }

  function update(dt) {
    if (!running) return;

    const maxSpeed = BALL_SPEED;
    const steps = Math.max(1, Math.ceil((maxSpeed * dt) / MAX_STEP_TRAVEL));
    const stepDt = dt / steps;

    for (let s = 0; s < steps; s++) {
      for (const b of balls) {
        b.x += b.vx * stepDt;
        b.y += b.vy * stepDt;
        solveBallWallOverlaps(b);
      }
      handleBallBall();
      for (const b of balls) solveBallWallOverlaps(b);
    }

    for (const b of balls) {
      if (checkExit(b)) {
        running = false;
        stopTime = performance.now();
        break;
      }
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    ctx.strokeStyle = "#fff";
    ctx.lineWidth = 3;

    ctx.save();
    ctx.translate(cx, cy);

    // pierścienie (wizualnie cienkie, fizycznie grube)
    for (let i = 0; i < rings.length; i++) {
      const R = rings[i];
      const gaps = ringGaps[i];
      const step = Math.PI / 80;
      let segStart = null;

      for (let a = -Math.PI; a <= Math.PI + 0.001; a += step) {
        const open = angleInGap(a, gaps);
        if (!open) {
          if (segStart === null) segStart = a;
        } else {
          if (segStart !== null) {
            ctx.beginPath();
            ctx.arc(0, 0, R, segStart, a);
            ctx.stroke();
            segStart = null;
          }
        }
      }
      if (segStart !== null) {
        ctx.beginPath();
        ctx.arc(0, 0, R, segStart, Math.PI);
        ctx.stroke();
      }
    }

    // ściany działowe (wizualnie cienkie)
    for (const w of radialWalls) {
      ctx.beginPath();
      ctx.moveTo(Math.cos(w.angle) * w.r1, Math.sin(w.angle) * w.r1);
      ctx.lineTo(Math.cos(w.angle) * w.r2, Math.sin(w.angle) * w.r2);
      ctx.stroke();
    }

    ctx.restore();

    // piłki
    for (const b of balls) {
      ctx.beginPath();
      ctx.fillStyle = b.color;
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  let lastT = null;
  function loop(t) {
    if (startTime === null) startTime = t;
    const dt = (t - (lastT || t)) / 1000;
    lastT = t;

    if (running) {
      update(dt);
      draw();
      timeEl.textContent = ((t - startTime) / 1000).toFixed(3) + " s";
      requestAnimationFrame(loop);
    } else {
      draw();
      timeEl.textContent = ((stopTime - startTime) / 1000).toFixed(3) + " s";
    }
  }

  requestAnimationFrame(loop);
})();
</script>

</body>
</html>
