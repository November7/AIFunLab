<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<title>Centryczny labirynt z piłkami</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #fff;
    font-family: system-ui, sans-serif;
    overflow: hidden;
  }
  #hud {
    padding: 10px 20px;
    background: #000;
    font-size: 18px;
    font-weight: 600;
  }
  #time {
    color: #0ff;
  }
  canvas {
    display: block;
  }
</style>
</head>
<body>

<div id="hud">Czas: <span id="time">0.000 s</span></div>
<canvas id="c"></canvas>

<script>
(() => {
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");
  const timeEl = document.getElementById("time");

  let W, H, cx, cy, scale;
  let startTime = null;
  let stopTime = null;
  let running = true;

  const ballSpeed = 260;
  const ballRadius = 5;
  const numBalls = 5;

  const rings = [];
  const ringGaps = [];
  const radialWalls = [];

  let exitGap;
  let exitRadius;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    W = canvas.width;
    H = canvas.height;
    cx = W / 2;
    cy = H / 2;

    const margin = 40;
    const ringCount = 7;
    const baseR = 40;
    const step = 40;
    const baseMaxRadius = baseR + (ringCount - 1) * step;
    const maxPossibleRadius = Math.min(W, H) / 2 - margin;
    scale = maxPossibleRadius / baseMaxRadius;
  }
  window.addEventListener("resize", () => {
    resize();
    generateStaticMaze();
  });
  resize();

  function angleNorm(a) {
    while (a <= -Math.PI) a += 2 * Math.PI;
    while (a > Math.PI) a -= 2 * Math.PI;
    return a;
  }

  function angleInGap(theta, gaps) {
    theta = angleNorm(theta);
    for (const g of gaps) {
      let s = angleNorm(g.start);
      let e = angleNorm(g.end);
      if (s <= e) {
        if (theta >= s && theta <= e) return true;
      } else {
        if (theta >= s || theta <= e) return true;
      }
    }
    return false;
  }

  function generateStaticMaze() {
    rings.length = 0;
    ringGaps.length = 0;
    radialWalls.length = 0;

    const ringCount = 7;
    const baseR = 40;
    const step = 40;

    for (let i = 0; i < ringCount; i++) {
      const R = (baseR + i * step) * scale;
      rings.push(R);
    }

    // Główna ścieżka "wijąca się" przez pierścienie (w radianach)
    // Każdy pierścień ma co najmniej jedną przerwę częściowo zachodzącą na poprzednią
    ringGaps.push([
      { start: -0.3, end: 0.3 },          // R0
      { start:  2.4, end: 2.9 }          // dodatkowa przerwa
    ]);
    ringGaps.push([
      { start:  0.1, end: 0.7 },         // R1
      { start: -2.4, end: -2.0 }
    ]);
    ringGaps.push([
      { start:  0.6, end: 1.2 },         // R2
      { start: -1.8, end: -1.3 }
    ]);
    ringGaps.push([
      { start:  1.1, end: 1.7 },         // R3
      { start: -0.9, end: -0.4 }
    ]);
    ringGaps.push([
      { start:  1.5, end: 2.1 },         // R4
      { start:  0.0, end: 0.3 }
    ]);
    ringGaps.push([
      { start:  1.9, end: 2.5 },         // R5
      { start: -2.8, end: -2.3 }
    ]);
    ringGaps.push([
      { start:  2.2, end: 2.8 },         // R6 (zewnętrzny, wyjście)
      { start: -1.2, end: -0.8 }
    ]);

    // Ściany działowe: krótkie odcinki między sąsiednimi pierścieniami
    // Każda ściana jest w jednym "pierścieniu" (między R[i] a R[i+1])
    const wallDefs = [
      // ringIndex, angle (radiany)
      { ring: 0, angle: -Math.PI * 0.75 },
      { ring: 0, angle:  Math.PI * 0.35 },
      { ring: 1, angle: -Math.PI * 0.1  },
      { ring: 1, angle:  Math.PI * 0.9  },
      { ring: 2, angle: -Math.PI * 0.5  },
      { ring: 2, angle:  Math.PI * 0.2  },
      { ring: 3, angle:  Math.PI * 0.75 },
      { ring: 3, angle: -Math.PI * 0.3  },
      { ring: 4, angle:  Math.PI * 1.1  },
      { ring: 4, angle: -Math.PI * 0.9  },
      { ring: 5, angle:  Math.PI * 0.0  },
      { ring: 5, angle: -Math.PI * 0.6  }
    ];

    for (const w of wallDefs) {
      radialWalls.push({
        angle: w.angle,
        r1: rings[w.ring],
        r2: rings[w.ring + 1]
      });
    }

    exitGap = ringGaps[ringGaps.length - 1][0]; // pierwsza przerwa w zewnętrznym pierścieniu
    exitRadius = rings[rings.length - 1];
  }

  generateStaticMaze();

  const balls = [];

  function createBalls() {
    balls.length = 0;
    const colors = ["#0ff", "#f0f", "#ff0", "#0f0", "#f00", "#08f"];
    for (let i = 0; i < numBalls; i++) {
      const a = Math.random() * Math.PI * 2;
      balls.push({
        x: cx + Math.random() * 10 - 5,
        y: cy + Math.random() * 10 - 5,
        vx: Math.cos(a) * ballSpeed,
        vy: Math.sin(a) * ballSpeed,
        r: ballRadius,
        color: colors[i % colors.length]
      });
    }
  }

  createBalls();

  function reflectRadial(ball, R) {
    const dx = ball.x - cx;
    const dy = ball.y - cy;
    const len = Math.hypot(dx, dy) || 1;
    const nx = dx / len;
    const ny = dy / len;
    const dot = ball.vx * nx + ball.vy * ny;
    ball.vx -= 2 * dot * nx;
    ball.vy -= 2 * dot * ny;
    const target = R + (ball.r + 0.5) * (len > R ? 1 : -1);
    ball.x = cx + nx * target;
    ball.y = cy + ny * target;
  }

  function reflectTangential(ball, angle) {
    const nx = Math.cos(angle + Math.PI / 2);
    const ny = Math.sin(angle + Math.PI / 2);
    const dot = ball.vx * nx + ball.vy * ny;
    ball.vx -= 2 * dot * nx;
    ball.vy -= 2 * dot * ny;
  }

  function handleBallMaze(ball, dt) {
    const steps = 4;
    const stepDt = dt / steps;

    for (let s = 0; s < steps; s++) {
      ball.x += ball.vx * stepDt;
      ball.y += ball.vy * stepDt;

      const dx = ball.x - cx;
      const dy = ball.y - cy;
      let r = Math.hypot(dx, dy);
      let theta = Math.atan2(dy, dx);

      // kolizje z pierścieniami
      for (let i = 0; i < rings.length; i++) {
        const R = rings[i];
        if (Math.abs(r - R) < ball.r + 1) {
          if (!angleInGap(theta, ringGaps[i])) {
            reflectRadial(ball, R);
            const ndx = ball.x - cx;
            const ndy = ball.y - cy;
            r = Math.hypot(ndx, ndy);
            theta = Math.atan2(ndy, ndx);
          }
        }
      }

      // kolizje z liniami działowymi (w jednym pierścieniu)
      for (const w of radialWalls) {
        if (r < w.r1 || r > w.r2) continue;
        const diff = Math.abs(angleNorm(theta - w.angle));
        const th = ball.r / (r || 1);
        if (diff < th) {
          reflectTangential(ball, w.angle);
          const sign = theta > w.angle ? 1 : -1;
          const newTheta = w.angle + sign * th;
          ball.x = cx + Math.cos(newTheta) * r;
          ball.y = cy + Math.sin(newTheta) * r;
        }
      }
    }
  }

  function handleBallBall() {
    for (let i = 0; i < balls.length; i++) {
      for (let j = i + 1; j < balls.length; j++) {
        const a = balls[i], b = balls[j];
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const dist = Math.hypot(dx, dy);
        const minD = a.r + b.r;
        if (dist > 0 && dist < minD) {
          const nx = dx / dist;
          const ny = dy / dist;
          const dvx = a.vx - b.vx;
          const dvy = a.vy - b.vy;
          const rel = dvx * nx + dvy * ny;
          if (rel > 0) continue;
          const imp = -2 * rel / 2;
          const ix = imp * nx;
          const iy = imp * ny;
          a.vx += ix; a.vy += iy;
          b.vx -= ix; b.vy -= iy;
          const overlap = (minD - dist) / 2;
          a.x -= nx * overlap;
          a.y -= ny * overlap;
          b.x += nx * overlap;
          b.y += ny * overlap;
        }
      }
    }
  }

  function checkExit(ball) {
    const dx = ball.x - cx;
    const dy = ball.y - cy;
    const r = Math.hypot(dx, dy);
    const th = Math.atan2(dy, dx);
    if (r > exitRadius + 5) {
      if (angleInGap(th, [exitGap])) return true;
    }
    return false;
  }

  function update(dt) {
    if (!running) return;
    for (const b of balls) {
      handleBallMaze(b, dt);
    }
    handleBallBall();
    for (const b of balls) {
      if (checkExit(b)) {
        running = false;
        stopTime = performance.now();
      }
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    ctx.strokeStyle = "#fff";
    ctx.lineWidth = 3;

    ctx.save();
    ctx.translate(cx, cy);

    // pierścienie (łuki ścian)
    for (let i = 0; i < rings.length; i++) {
      const R = rings[i];
      const gaps = ringGaps[i];
      const step = Math.PI / 80;
      let segStart = null;

      for (let a = -Math.PI; a <= Math.PI + 0.001; a += step) {
        const open = angleInGap(a, gaps);
        if (!open) {
          if (segStart === null) segStart = a;
        } else {
          if (segStart !== null) {
            ctx.beginPath();
            ctx.arc(0, 0, R, segStart, a);
            ctx.stroke();
            segStart = null;
          }
        }
      }
      if (segStart !== null) {
        ctx.beginPath();
        ctx.arc(0, 0, R, segStart, Math.PI);
        ctx.stroke();
      }
    }

    // ściany działowe w pierścieniach
    for (const w of radialWalls) {
      ctx.beginPath();
      ctx.moveTo(Math.cos(w.angle) * w.r1, Math.sin(w.angle) * w.r1);
      ctx.lineTo(Math.cos(w.angle) * w.r2, Math.sin(w.angle) * w.r2);
      ctx.stroke();
    }

    // wyjście (zaznaczone na zewnętrznym pierścieniu)
    ctx.strokeStyle = "#0f0";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(0, 0, exitRadius, exitGap.start, exitGap.end);
    ctx.stroke();

    ctx.restore();

    // piłki
    for (const b of balls) {
      ctx.beginPath();
      ctx.fillStyle = b.color;
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  let lastT = null;
  function loop(t) {
    if (startTime === null) startTime = t;
    const dt = (t - (lastT || t)) / 1000;
    lastT = t;

    if (running) {
      update(dt);
      draw();
      timeEl.textContent = ((t - startTime) / 1000).toFixed(3) + " s";
      requestAnimationFrame(loop);
    } else {
      draw();
      timeEl.textContent = ((stopTime - startTime) / 1000).toFixed(3) + " s";
    }
  }

  requestAnimationFrame(loop);
})();
</script>

</body>
</html>
