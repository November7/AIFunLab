<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Ping Pong</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      color: #eee;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 20px;
    }
    h1 { margin-bottom: 10px; }
    #info { margin-bottom: 10px; font-size: 14px; text-align: center; }
    #controls { margin-bottom: 10px; }
    #controls button {
      margin: 0 5px;
      padding: 5px 10px;
      cursor: pointer;
      border: none;
      background: #333;
      color: #eee;
    }
    #controls button.active {
      background: #0a7;
    }
    #limitBox {
      margin-bottom: 10px;
      font-size: 16px;
    }
    #limitBox input {
      width: 60px;
      padding: 3px;
      font-size: 16px;
      text-align: center;
    }
    canvas {
      background: #000;
      border: 2px solid #555;
    }
    #score {
      margin-top: 15px;
      font-size: 40px;
      font-weight: bold;
      letter-spacing: 5px;
    }
    #winner {
      margin-top: 10px;
      font-size: 26px;
      color: #0f0;
      height: 30px;
    }
  </style>
</head>
<body>
  <h1>Ping Pong</h1>

  <div id="info">
    Tryb 1 gracz: komputer (lewa) vs gracz (prawa, strzałki ↑/↓)<br>
    Tryb 2 graczy: lewa W/S, prawa ↑/↓
  </div>

  <div id="controls">
    <button id="mode1" class="active">1 gracz</button>
    <button id="mode2">2 graczy</button>
  </div>

  <div id="limitBox">
    Limit punktów: <input type="number" id="limit" value="5" min="1">
  </div>

  <canvas id="game" width="800" height="400"></canvas>

  <div id="score">0 : 0</div>
  <div id="winner"></div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const mode1Btn = document.getElementById('mode1');
    const mode2Btn = document.getElementById('mode2');
    const scoreBox = document.getElementById('score');
    const winnerBox = document.getElementById('winner');
    const limitInput = document.getElementById('limit');

    let twoPlayers = false;
    let scoreLeft = 0;
    let scoreRight = 0;

    const paddleWidth = 10;
    const paddleHeight = 80;
    const ballSize = 10;

    const leftPaddle = {
      x: 20,
      y: canvas.height / 2 - paddleHeight / 2,
      vy: 0,
      speed: 6
    };

    const rightPaddle = {
      x: canvas.width - 20 - paddleWidth,
      y: canvas.height / 2 - paddleHeight / 2,
      vy: 0,
      speed: 6
    };

    const ball = {
      x: canvas.width / 2,
      y: canvas.height / 2,
      vx: 5,
      vy: 3
    };

    let keys = {};

    function updateScore() {
      scoreBox.textContent = `${scoreLeft} : ${scoreRight}`;
    }

    function checkWinner() {
      const limit = parseInt(limitInput.value) || 5;
      if (scoreLeft >= limit) {
        winnerBox.textContent = "Wygrywa LEWA strona!";
        stopGame = true;
      }
      if (scoreRight >= limit) {
        winnerBox.textContent = "Wygrywa PRAWA strona!";
        stopGame = true;
      }
    }

    let stopGame = false;

    function resetBall(direction = 1) {
      ball.x = canvas.width / 2;
      ball.y = canvas.height / 2;
      ball.vx = 5 * direction;
      ball.vy = (Math.random() * 4 - 2) || 2;
    }

    function drawRect(x, y, w, h, color = '#fff') {
      ctx.fillStyle = color;
      ctx.fillRect(x, y, w, h);
    }

    function drawNet() {
      ctx.fillStyle = '#555';
      const segmentHeight = 10;
      for (let y = 0; y < canvas.height; y += 20) {
        ctx.fillRect(canvas.width / 2 - 1, y, 2, segmentHeight);
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawNet();
      drawRect(leftPaddle.x, leftPaddle.y, paddleWidth, paddleHeight);
      drawRect(rightPaddle.x, rightPaddle.y, paddleWidth, paddleHeight);
      drawRect(ball.x - ballSize / 2, ball.y - ballSize / 2, ballSize, ballSize);
    }

    function updatePaddles() {
      if (stopGame) return;

      rightPaddle.vy = 0;
      if (keys['ArrowUp']) rightPaddle.vy = -rightPaddle.speed;
      if (keys['ArrowDown']) rightPaddle.vy = rightPaddle.speed;
      rightPaddle.y += rightPaddle.vy;

      if (twoPlayers) {
        leftPaddle.vy = 0;
        if (keys['KeyW']) leftPaddle.vy = -leftPaddle.speed;
        if (keys['KeyS']) leftPaddle.vy = leftPaddle.speed;
        leftPaddle.y += leftPaddle.vy;
      } else {
        const center = leftPaddle.y + paddleHeight / 2;
        if (ball.y < center - 10) leftPaddle.y -= leftPaddle.speed * 0.9;
        else if (ball.y > center + 10) leftPaddle.y += leftPaddle.speed * 0.9;
      }

      [leftPaddle, rightPaddle].forEach(p => {
        if (p.y < 0) p.y = 0;
        if (p.y + paddleHeight > canvas.height) p.y = canvas.height - paddleHeight;
      });
    }

    function updateBall() {
      if (stopGame) return;

      ball.x += ball.vx;
      ball.y += ball.vy;

      if (ball.y - ballSize / 2 < 0 || ball.y + ballSize / 2 > canvas.height) {
        ball.vy *= -1;
      }

      if (
        ball.x - ballSize / 2 < leftPaddle.x + paddleWidth &&
        ball.y > leftPaddle.y &&
        ball.y < leftPaddle.y + paddleHeight
      ) {
        ball.vx = Math.abs(ball.vx);
        const offset = ball.y - (leftPaddle.y + paddleHeight / 2);
        ball.vy = offset * 0.2;
      }

      if (
        ball.x + ballSize / 2 > rightPaddle.x &&
        ball.y > rightPaddle.y &&
        ball.y < rightPaddle.y + paddleHeight
      ) {
        ball.vx = -Math.abs(ball.vx);
        const offset = ball.y - (rightPaddle.y + paddleHeight / 2);
        ball.vy = offset * 0.2;
      }

      if (ball.x < 0) {
        scoreRight++;
        updateScore();
        checkWinner();
        resetBall(1);
      } else if (ball.x > canvas.width) {
        scoreLeft++;
        updateScore();
        checkWinner();
        resetBall(-1);
      }
    }

    function loop() {
      updatePaddles();
      updateBall();
      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    mode1Btn.addEventListener('click', () => {
      twoPlayers = false;
      mode1Btn.classList.add('active');
      mode2Btn.classList.remove('active');
      resetGame();
    });

    mode2Btn.addEventListener('click', () => {
      twoPlayers = true;
      mode2Btn.classList.add('active');
      mode1Btn.classList.remove('active');
      resetGame();
    });

    function resetGame() {
      scoreLeft = 0;
      scoreRight = 0;
      updateScore();
      winnerBox.textContent = "";
      stopGame = false;
      resetBall(1);
    }

    resetGame();
    loop();
  </script>
</body>
</html>
